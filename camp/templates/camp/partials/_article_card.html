{% comment %}Expects: article, detail_url{% endcomment %}
<article class="bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-sm hover:shadow-md transition-shadow group">
  <div class="aspect-[16/9] overflow-hidden bg-gray-100">
    {% if article.get_cover_image %}
      <img src="{{ article.get_cover_image }}" alt="{{ article.title }}"
           class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
    {% else %}
      <div class="w-full h-full flex items-center justify-center bg-gradient-to-br from-primary/10 to-second/20">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-primary/30" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
      </div>
    {% endif %}
  </div>

  <div class="p-5">
    <div class="flex items-center gap-2 text-xs text-gray-400 mb-3">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>{{ article.created_at|date:"j F Y" }}</span>
    </div>

    <h3 class="font-bold text-dark text-lg leading-snug mb-2 line-clamp-2 group-hover:text-primary transition-colors">
      {{ article.title }}
    </h3>

    {% if article.brief %}
    <p class="text-gray-500 text-sm leading-relaxed line-clamp-3 mb-4">{{ article.brief }}</p>
    {% endif %}

    <a href="{{ detail_url }}"
       class="inline-flex items-center gap-1.5 text-primary text-sm font-semibold hover:gap-3 transition-all">
      اقرأ المزيد
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
  </div>
</article>
